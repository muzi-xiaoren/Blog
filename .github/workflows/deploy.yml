name: Deploy Hexo Blog

on:
  push:
    branches:
      - main  # 当推送到 main 分支时触发
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 源码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，某些主题可能需要

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'  # 使用 Node.js 18
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 生成静态文件
        run: npx hexo clean && npx hexo generate

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}  # 使用自定义 token 以支持跨仓库推送
          publish_dir: ./public
          external_repository: muzi-xiaoren/muzi-xiaoren.github.io
          publish_branch: main
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy from Blog repo: ${{ github.event.head_commit.message }}'
